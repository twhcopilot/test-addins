<!-- taskpane.html -->
<!DOCTYPE html>
<html>
<head>
  <title>Outlook Add-in Task Pane</title>
  <meta charset="utf-8" />
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { color: #0078D7; }
    button {
      padding: 10px 15px;
      background-color: #0078D7;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #005EA6;
    }
  </style>
</head>
<body>
  <h1>Hello from Task Pane</h1>
  <p>This is a sample Outlook Add-in panel.</p>
  <button onclick="alert('You clicked the button!')">Click me</button>
</body>
</html>
